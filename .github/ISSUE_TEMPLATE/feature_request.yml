name: Feature Request
description: Suggest a catalog, asset, or maintenance workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real user workflow is painful or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope Check
      options:
        - label: This does not require bundling copyrighted third-party asset packs in the repository.
          required: true
        - label: This keeps user library data local by default.
          required: true
